---
template:
  direction: Horizontal
  parts:
    - direction: Vertical  # part 1
      borderless: true
      split_size:
        Fixed: 1
      run:
        plugin:
          location: "zellij:tab-bar"
    - direction: Vertical # part 2
      body: true
    - direction: Vertical # part 3
      borderless: true
      split_size:
        Fixed: 2
      run:
        plugin:
          location: "zellij:status-bar"
tabs:
  - name: "Code" # tab 1
    direction: Horizontal
    focus: true
    run:
      command: {cmd: fish, args: ["-C", "cd ~/Programming/Captario-SUM && nvim"]}
    
  - name: "Servers" # tab 3
    direction: Vertical
    parts:
      - direction: Horizontal
        parts:
          - direction: Horizontal
            run:
              command: { cmd: fish, args: ["-C", "cd ~/Programming/Captario-SUM && docker-compose up sqlserver"]}
          - direction: Vertical
            run:
              command: { cmd: fish, args: ["-C", "cd ~/Programming/Captario-SUM && dotnet run --project api/src/Captario.Sum.Host.Core/Captario.Sum.Host.Core.csproj"]} 
      - direction: Horizontal
        parts:
          - direction: Horizontal
            run:
              command: { cmd: fish, args: ["-C", "cd ~/Programming/Captario-SUM/client && npm run start"]}
          - direction: Vertical
            run:
              command: { cmd: fish, args: ["-C", "cd ~/Programming/Captario-SUM/python/projects/zombie-api && LD_PRELOAD=/usr/local/lib/libjemalloc.so PROD=False SIMULATION_DATA_PATH=/home/sebastianpantinliljevall/sumdata/000000000000000000000001/sim DISABLE_CACHE=true poetry run poe start-reload"]}
